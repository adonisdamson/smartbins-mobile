name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'mobile-v*'

jobs:
  build-apks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [household, collector]

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: stable
          cache: true

      - name: Write .env file
        env:
          MOBILE_ENV: ${{ secrets.MOBILE_ENV }}
        run: |
          test -n "$MOBILE_ENV"
          echo "$MOBILE_ENV" > .env

      - name: Decode google-services.json (household)
        env:
          GOOGLE_SERVICES_JSON_HOUSEHOLD: ${{ secrets.GOOGLE_SERVICES_JSON_HOUSEHOLD }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON_HOUSEHOLD"
          mkdir -p android/app/src/household
          echo "$GOOGLE_SERVICES_JSON_HOUSEHOLD" | base64 --decode > android/app/src/household/google-services.json

      - name: Decode google-services.json (collector)
        env:
          GOOGLE_SERVICES_JSON_COLLECTOR: ${{ secrets.GOOGLE_SERVICES_JSON_COLLECTOR }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON_COLLECTOR"
          mkdir -p android/app/src/collector
          echo "$GOOGLE_SERVICES_JSON_COLLECTOR" | base64 --decode > android/app/src/collector/google-services.json

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Flutter test
        run: flutter test --no-pub

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: >
          flutter build apk
          --release
          --flavor ${{ matrix.flavor }}
          --target lib/main_${{ matrix.flavor }}.dart
          --build-name=${{ github.ref_name }}
          --build-number=${{ github.run_number }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartbins-${{ matrix.flavor }}-apk
          path: mobile/build/app/outputs/flutter-apk/*${{ matrix.flavor }}*release.apk
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs: build-apks
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download household APK
        uses: actions/download-artifact@v4
        with:
          name: smartbins-household-apk
          path: apks/

      - name: Download collector APK
        uses: actions/download-artifact@v4
        with:
          name: smartbins-collector-apk
          path: apks/

      - name: Rename APKs
        run: |
          mv apks/*household*release.apk apks/SmartBins-Eco-${{ github.ref_name }}.apk
          mv apks/*collector*release.apk apks/SmartBins-Collector-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SmartBins ${{ github.ref_name }}
          body: |
            ## SmartBins ${{ github.ref_name }}

            ### Downloads
            - **SmartBins Eco** (Household app) — `SmartBins-Eco-${{ github.ref_name }}.apk`
            - **SmartBins Collector** (Driver app) — `SmartBins-Collector-${{ github.ref_name }}.apk`

            ### Install
            Enable "Install from unknown sources" in Android Settings → Security, then open the APK.
          files: |
            apks/SmartBins-Eco-${{ github.ref_name }}.apk
            apks/SmartBins-Collector-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
